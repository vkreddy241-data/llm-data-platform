name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install \
            anthropic==0.28.0 \
            fastapi==0.111.0 \
            uvicorn==0.30.0 \
            pydantic==2.7.0 \
            httpx==0.27.0 \
            pytest==7.4.4 \
            pytest-cov==4.1.0

      - name: Run tests
        run: pytest tests/ -v --cov=ai --cov=api --cov=catalog --cov-report=xml

      - uses: codecov/codecov-action@v5
        with:
          file: coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.3.0
      - run: ruff check . --ignore E501,E731,E712
